<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="600" cy="120" r="200" fill="white" opacity="0.05"/>
  <circle cx="200" cy="380" r="150" fill="white" opacity="0.04"/>
  <!-- Two people silhouette -->
  <g transform="translate(280, 120)">
    <!-- Tutor -->
    <circle cx="80" cy="60" r="30" fill="white" opacity="0.15"/>
    <rect x="55" y="95" width="50" height="80" rx="8" fill="white" opacity="0.1"/>
    <!-- Student -->
    <circle cx="180" cy="70" r="25" fill="white" opacity="0.12"/>
    <rect x="160" y="100" width="40" height="70" rx="6" fill="white" opacity="0.08"/>
    <!-- Connection line -->
    <line x1="110" y1="120" x2="160" y2="130" stroke="#F0C040" stroke-opacity="0.4" stroke-width="3" stroke-dasharray="8 4"/>
  </g>
  <!-- Whiteboard -->
  <g transform="translate(320, 220)">
    <rect x="0" y="0" width="160" height="100" rx="6" fill="white" opacity="0.12" stroke="white" stroke-opacity="0.2" stroke-width="2"/>
    <rect x="15" y="20" width="60" height="4" rx="2" fill="white" opacity="0.2"/>
    <rect x="15" y="32" width="90" height="4" rx="2" fill="white" opacity="0.15"/>
    <rect x="15" y="44" width="70" height="4" rx="2" fill="white" opacity="0.15"/>
    <rect x="15" y="60" width="50" height="4" rx="2" fill="#F0C040" opacity="0.3"/>
    <rect x="15" y="72" width="80" height="4" rx="2" fill="white" opacity="0.1"/>
  </g>
  <!-- Lightbulb -->
  <g transform="translate(190, 200)">
    <circle cx="20" cy="20" r="16" fill="#F0C040" opacity="0.3"/>
    <rect x="16" y="36" width="8" height="10" rx="2" fill="#F0C040" opacity="0.2"/>
    <line x1="20" y1="0" x2="20" y2="-8" stroke="#F0C040" stroke-opacity="0.3" stroke-width="2"/>
    <line x1="5" y1="8" x2="0" y2="3" stroke="#F0C040" stroke-opacity="0.2" stroke-width="2"/>
    <line x1="35" y1="8" x2="40" y2="3" stroke="#F0C040" stroke-opacity="0.2" stroke-width="2"/>
  </g>
  <!-- Stars -->
  <text x="550" y="180" font-size="18" fill="white" opacity="0.15">★</text>
  <text x="150" y="140" font-size="14" fill="#F0C040" opacity="0.2">★</text>
  <!-- Title -->
  <text x="400" y="440" text-anchor="middle" fill="white" font-size="18" font-family="system-ui, sans-serif" font-weight="600" opacity="0.7">1-on-1 Tutoring</text>
</svg>
