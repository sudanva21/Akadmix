<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="650" cy="100" r="180" fill="white" opacity="0.08"/>
  <circle cx="150" cy="400" r="120" fill="white" opacity="0.06"/>
  <!-- Code brackets -->
  <g transform="translate(300, 140)" opacity="0.9">
    <text x="0" y="0" fill="white" font-size="80" font-family="monospace" font-weight="700" opacity="0.3">&lt;/&gt;</text>
  </g>
  <!-- Laptop shape -->
  <g transform="translate(280, 220)">
    <rect x="40" y="20" width="160" height="100" rx="8" fill="white" opacity="0.15" stroke="white" stroke-opacity="0.25" stroke-width="2"/>
    <rect x="55" y="40" width="50" height="4" rx="2" fill="#0A0F2C" opacity="0.3"/>
    <rect x="55" y="52" width="80" height="4" rx="2" fill="#0A0F2C" opacity="0.2"/>
    <rect x="55" y="64" width="60" height="4" rx="2" fill="#0A0F2C" opacity="0.2"/>
    <rect x="55" y="76" width="90" height="4" rx="2" fill="#0A0F2C" opacity="0.15"/>
    <rect x="55" y="88" width="40" height="4" rx="2" fill="#2563EB" opacity="0.4"/>
    <rect x="20" y="120" width="200" height="8" rx="4" fill="white" opacity="0.1"/>
  </g>
  <!-- Trophy -->
  <g transform="translate(560, 180)">
    <rect x="25" y="60" width="30" height="6" rx="2" fill="white" opacity="0.3"/>
    <rect x="30" y="40" width="20" height="20" rx="2" fill="white" opacity="0.2"/>
    <polygon points="40,10 50,30 30,30" fill="#F0C040" opacity="0.6"/>
  </g>
  <!-- Stars -->
  <text x="200" y="180" font-size="20" fill="white" opacity="0.2">★</text>
  <text x="620" y="350" font-size="16" fill="white" opacity="0.15">★</text>
  <text x="400" y="420" font-size="28" fill="white" opacity="0.1">★</text>
  <!-- Title -->
  <text x="400" y="440" text-anchor="middle" fill="white" font-size="18" font-family="system-ui, sans-serif" font-weight="600" opacity="0.7">Hackathon Tips</text>
</svg>
